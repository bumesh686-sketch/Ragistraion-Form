<html>
<head>
<title>Marquee Img Audio and Video</title>
</head>
<!-- this is marquee with img tag -->
<body bgcolor="black" text="white">
<marquee scrollamount=50><img src="b.jpg" height=200px width=600px alt="Omkar ki Car"></marquee>

<br><br>
<!-- this is audio tag -->
<audio controls>
<source src="song.mp3" type="audio/mp3">
</audio>

<br><br>
<!-- this is video tag -->
<video controls height=300px width=400>
<source src="hitman.mp4" type=video/mp4 >
</video>

</body>
</html>
